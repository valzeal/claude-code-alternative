# Zeal Code UI - Nginx Configuration
# Streamlit web interface

server {
    listen 80;
    server_name app.zealhaven.net;

    # Logging
    access_log /var/log/nginx/zeal-code-ui-access.log;
    error_log /var/log/nginx/zeal-code-ui-error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client body size limit
    client_max_body_size 200M;

    # WebSocket support for Streamlit
    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;

        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Streamlit static files
    location /_static/ {
        proxy_pass http://127.0.0.1:8501/_static/;
        proxy_cache_valid 200 1h;
    }

    # Streamlit health check
    location /_stcore/health {
        proxy_pass http://127.0.0.1:8501/_stcore/health;
        access_log off;
    }

    # Streamlit WebSocket endpoint
    location /stream {
        proxy_pass http://127.0.0.1:8501/stream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
